<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - J.M Dharshan Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard">
        <header class="dash-header">
            <div class="container">
                <div class="dash-nav">
                    <h1>Dashboard <i class="fas fa-tachometer-alt"></i></h1>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <main class="dash-main">
            <div class="container">
                <div class="dash-stats">
                    <div class="stat-card">
                        <i class="fas fa-project-diagram"></i>
                        <div>
                            <h3>7</h3>
                            <p>Projects</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div>
                            <h3>150+</h3>
                            <p>Visitors</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-heart"></i>
                        <div>
                            <h3>45</h3>
                            <p>Likes</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-code"></i>
                        <div>
                            <h3>2k+</h3>
                            <p>Lines of Code</p>
                        </div>
                    </div>
                </div>

                <div class="dash-content">
                    <section class="quick-actions">
                        <h2>Quick Actions</h2>
                        <div class="action-grid">
                            <button class="action-btn">
                                <i class="fas fa-edit"></i>
                                <span>Edit Profile</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-chart-line"></i>
                                <span>View Analytics</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-download"></i>
                                <span>Export Data</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-cog"></i>
                                <span>Settings</span>
                            </button>
                        </div>
                    </section>

                    <section class="recent-activity">
                        <h2>Recent Activity</h2>
                        <div class="activity-list">
                            <div class="activity-item">
                                <i class="fas fa-heart"></i>
                                <span>Project "Phishing Detector" liked by 3 users</span>
                                <small>2 hours ago</small>
                            </div>
                            <div class="activity-item">
                                <i class="fas fa-eye"></i>
                                <span>Portfolio viewed 12 times today</span>
                                <small>5 hours ago</small>
                            </div>
                            <div class="activity-item">
                                <i class="fas fa-download"></i>
                                <span>Resume downloaded</span>
                                <small>1 day ago</small>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('loggedIn');
            window.location.href = 'index.html';
        }

        // Check auth
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // Dashboard interactivity
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    btn.style.transform = '';
                }, 150);
            });
        });
    </script>

    <style>
        /* Dashboard specific styles - optimized for performance */
        .dashboard {
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-deep) 0%, var(--bg) 100%);
        }

        .dash-header {
            background: rgba(8, 14, 25, 0.95);
            border-bottom: 1px solid rgba(26, 214, 255, 0.2);
            backdrop-filter: blur(20px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .dash-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .dash-nav h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-1px);
        }

        .dash-main {
            padding: 60px 0;
        }

        .dash-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: rgba(17, 37, 58, 0.8);
            border: 1px solid rgba(26, 214, 255, 0.3);
            border-radius: 18px;
            padding: 28px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 20px 40px rgba(26, 214, 255, 0.2);
            transform: translateY(-4px);
        }

        .stat-card i {
            font-size: 2.5rem;
            color: var(--cyan);
            margin-bottom: 12px;
        }

        .stat-card h3 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--cyan), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card p {
            color: var(--muted-strong);
            font-size: 0.95rem;
        }

        .dash-content > section {
            margin-bottom: 48px;
        }

        .dash-content h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 24px;
            color: var(--text);
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .action-btn {
            background: rgba(17, 37, 58, 0.8);
            border: 1px solid rgba(26, 214, 255, 0.4);
            color: var(--text);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .action-btn:hover {
            border-color: var(--cyan);
            background: rgba(26, 214, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(26, 214, 255, 0.2);
        }

        .action-btn i {
            font-size: 1.8rem;
            color: var(--cyan);
        }

        .activity-list {
            background: rgba(8, 14, 25, 0.6);
            border: 1px solid rgba(26, 214, 255, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s ease;
        }

        .activity-item:hover {
            background: rgba(26, 214, 255, 0.08);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item i {
            color: var(--cyan);
            font-size: 1.2rem;
            width: 32px;
        }

        .activity-item span {
            flex: 1;
            color: var(--text);
        }

        .activity-item small {
            color: var(--muted);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .dash-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-grid {
                grid-template-columns: 1fr;
            }

            .dash-nav {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
